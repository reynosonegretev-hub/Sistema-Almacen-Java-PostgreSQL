<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Catálogo de productos</title>
    </h:head>
    <h:body>


        <div class="card crud-demo">
            <h:form id="form_dialog_agregar">
                <p:dialog header="Agregar producto " 
                          showEffect="fade" 
                          modal="true"
                          width="400"
                          fitViewport="true"
                          widgetVar="agregarProductoDialogo"
                          responsive="true">
                    <p:outputPanel id="agregar-producto-contenido" class="ui-fluid">
                        <div class="field">
                            <p:outputLabel>Clave</p:outputLabel>
                            <p:inputText id="agregar_clave" 
                                         value="#{productoBean.producto.clave}"/>
                        </div>

                        <div class="field">
                            <p:outputLabel>Descripción</p:outputLabel>
                            <p:inputTextarea id="agregar_descripcion" 
                                             value="#{productoBean.producto.descripcion}" />
                        </div>

                        <div class="formgrid grid">
                            <div class="field col">
                                <p:outputLabel>Precio</p:outputLabel>
                                <p:inputNumber id="agregar_precio" 
                                               value="#{productoBean.producto.precio}" 
                                               symbol="$"
                                               decimalSeparator="." 
                                               thousandSeparator="," />
                            </div>
                            <div class="field col">
                                <p:outputLabel>Existencia</p:outputLabel>
                                <p:spinner id="agregar_existencia" 
                                           min="0" value="#{productoBean.producto.existencia}" />
                            </div>
                        </div>
                    </p:outputPanel>

                    <f:facet name="footer">
                        <p:commandButton value="Guardar" icon="pi pi-check" 
                                         actionListener="#{controlProducto.insertarProducto()}"
                                         update=":form:dt-products"
                                         oncomplete="PF('agregarProductoDialogo').hide()"/>
                        <p:commandButton value="Cancelar" icon="pi pi-times" 
                                         onclick="PF('agregarProductoDialogo').hide()"
                                         class="ui-button-secondary" type="button" />
                    </f:facet>
                </p:dialog>
            </h:form>

            <h:form id="form_dialog_modificar">
                <p:dialog header="Actualizar producto " 
                          showEffect="fade" 
                          width="300"
                          position="center"
                          modal="true"
                          fitViewport="true"
                          widgetVar="actualizarProductoDialogo"
                          responsive="true">
                    <p:outputPanel id="actualizar-producto-contenido" class="ui-fluid">
                        <div class="field">
                            <p:outputLabel>Clave</p:outputLabel>
                            <p:inputText id="actualizar_clave" 
                                         value="#{productoBean.producto.clave}"/>
                        </div>

                        <div class="field">
                            <p:outputLabel>Descripción</p:outputLabel>
                            <p:inputTextarea id="actualizar_descripcion" 
                                             value="#{productoBean.producto.descripcion}" />
                        </div>

                        <div class="formgrid grid">
                            <div class="field col">
                                <p:outputLabel>Precio</p:outputLabel>
                                <p:inputNumber id="actualizar_precio" 
                                               value="#{productoBean.producto.precio}" 
                                               symbol="$"
                                               decimalSeparator="." 
                                               thousandSeparator="," />
                            </div>
                            <div class="field col">
                                <p:outputLabel>Existencia</p:outputLabel>
                                <p:spinner id="actualizar_existencia" 
                                           min="0" value="#{productoBean.producto.existencia}" />
                            </div>
                        </div>
                    </p:outputPanel>

                    <f:facet name="footer">
                        <p:commandButton value="Actualizar" 
                                         icon="pi pi-check" 
                                         actionListener="#{controlProducto.modificarProducto()}"
                                         update=":form:dt-products"
                                         oncomplete="PF('actualizarProductoDialogo').hide()"/>

                        <p:commandButton value="Cancelar" icon="pi pi-times" 
                                         onclick="PF('actualizarProductoDialogo').hide()"
                                         class="ui-button-secondary" type="button" />
                    </f:facet>
                </p:dialog>


                <p:confirmDialog widgetVar="deleteProductDialog" 
                                 showEffect="fade" 
                                 width="300"
                                 message="¿El producto será eliminado?" 
                                 header="Confirmar" 
                                 severity="warn">
                    <p:commandButton value="Si" 
                                     icon="pi pi-check" 
                                     actionListener="#{controlProducto.eliminarProducto()}"
                                     update=":form:dt-products"
                                     oncomplete="PF('deleteProductDialog').hide()" />
                    <p:commandButton value="No" type="button" 
                                     styleClass="ui-button-secondary" 
                                     icon="pi pi-times"
                                     onclick="PF('deleteProductDialog').hide()" />
                </p:confirmDialog>

                <p:confirmDialog global="true" showEffect="fade" width="300">
                    <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                    <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                                     icon="pi pi-times" />
                </p:confirmDialog>
            </h:form>

            <h:form id="form">
                <p:growl id="messages" showDetail="true" />

                <p:toolbar>
                    <p:toolbarGroup>
                        <p:commandButton value="Nuevo" 
                                         icon="pi pi-plus" 
                                         onclick="PF('agregarProductoDialogo').show()"
                                         styleClass="ui-button-success" 
                                         style="margin-right: .5rem">
                        </p:commandButton>

                    </p:toolbarGroup>

                    <p:toolbarGroup align="right">
                        <p:commandButton value="Actualizar" 
                                         icon="pi pi-refresh" 
                                         actionListener="#{controlProducto.listarProductos()}"
                                         update="dt-products" 
                                         styleClass="ui-button-success" 
                                         style="margin-right: .5rem">
                        </p:commandButton>
                    </p:toolbarGroup>
                    
                    <p:toolbarGroup align="right">
                        <p:commandButton value="Regresar" 
                                         icon="pi pi-home" 
                                         action="#{controlNavegacion.irMenu()}"
                                         update="dt-products" 
                                         styleClass="ui-button-success" 
                                         style="margin-right: .5rem">
                        </p:commandButton>
                    </p:toolbarGroup>
                </p:toolbar>


                <p:dataTable id="dt-products"
                             widgetVar="dtProducts" 
                             var="producto" 
                             value="#{productoBean.listaProductos}"
                             reflow="true" 
                             styleClass="products-table" 
                             rowKey="#{producto.id_producto}">
                    <f:facet name="header">
                        <div class="products-table-header">
                            <span style="font-weight: bold">CATÁLOGO DE PRODUCTOS</span>
                            <span class="filter-container ui-input-icon-left"> 
                                <i class="pi pi-search"></i>
                                <p:inputText id="globalFilter" 
                                             onkeyup="PrimeFaces.debounce(() => PF('dtProducts').filter())" 
                                             placeholder="Búsqueda" />
                            </span>
                        </div>
                    </f:facet>


                    <p:column headerText="Clave" 
                              sortBy="#{producto.clave}" 
                              filterBy="#{producto.clave}">
                        <h:outputText value="#{producto.clave}" />
                    </p:column>

                    <p:column headerText="Descripción" 
                              sortBy="#{producto.descripcion}" 
                              filterBy="#{producto.descripcion}">
                        <h:outputText value="#{producto.descripcion}" />
                    </p:column>

                    <p:column headerText="Precio" 
                              sortBy="#{producto.precio}">
                        <h:outputText value="#{producto.precio}" style="font-weight: 700">
                            <f:convertNumber currencySymbol="$" type="currency" />
                        </h:outputText>
                    </p:column>

                    <p:column headerText="Existencia">
                        <h:outputText value="#{producto.existencia}" />
                    </p:column>

                    <p:column exportable="false" ariaHeaderText="Actions">
                        <!-- Cambios en el botón para recuperar los datos del producto -->
                        <p:commandButton icon="pi pi-pencil"
                                         action="#{productoBean.recuperarDatos(producto)}"
                                         update=":form_dialog_modificar:actualizar-producto-contenido"
                                         oncomplete="PF('actualizarProductoDialogo').show()"
                                         styleClass="edit-button rounded-button ui-button-success">
                        </p:commandButton>
                        <!-- Termina botón de recuperar datos del producto -->
                        <p:spacer width="10"/>
                        <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash"
                                         process="@this"
                                         oncomplete="PF('deleteProductDialog').show()">
                            <f:setPropertyActionListener value="#{producto}" 
                                                         target="#{productoBean.productoSeleccionado}" />
                        </p:commandButton>
                    </p:column>

                </p:dataTable>
            </h:form>
        </div>


    </h:body>
</html>
